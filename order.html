<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食八方 · 中华美食点餐</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f1e8;
    color: #2c1810;
    min-height: 100vh;
  }
  /* Header */
  header {
    background: linear-gradient(135deg, #8b1a1a 0%, #c0392b 100%);
    color: #fff;
    padding: 24px 20px;
    box-shadow: 0 4px 20px rgba(139, 26, 26, 0.3);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 48px;
    height: 48px;
    background: #f4d03f;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    color: #8b1a1a;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .logo h1 {
    font-size: 24px;
    letter-spacing: 2px;
  }
  .logo .sub {
    font-size: 12px;
    opacity: 0.85;
    letter-spacing: 4px;
  }
  .cart-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    padding: 10px 18px;
    border-radius: 25px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    position: relative;
  }
  .cart-btn:hover { background: rgba(255,255,255,0.25); }
  .cart-badge {
    background: #f4d03f;
    color: #8b1a1a;
    font-weight: bold;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 12px;
    min-width: 22px;
    text-align: center;
  }

  /* Tabs */
  .tabs {
    background: #fff;
    border-bottom: 1px solid #e8dfd0;
    position: sticky;
    top: 96px;
    z-index: 40;
    overflow-x: auto;
    white-space: nowrap;
    -webkit-overflow-scrolling: touch;
  }
  .tabs-inner {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    gap: 4px;
    padding: 0 20px;
  }
  .tab {
    background: none;
    border: none;
    padding: 16px 18px;
    font-size: 15px;
    cursor: pointer;
    color: #666;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .tab.active {
    color: #8b1a1a;
    border-bottom-color: #8b1a1a;
    font-weight: bold;
  }
  .tab:hover { color: #8b1a1a; }

  /* Main */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 30px 20px 100px;
  }
  .category {
    margin-bottom: 40px;
  }
  .category-title {
    font-size: 22px;
    color: #8b1a1a;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .category-title::before {
    content: '';
    width: 4px;
    height: 22px;
    background: #8b1a1a;
    border-radius: 2px;
  }
  .category-desc {
    color: #888;
    font-size: 13px;
    margin-bottom: 18px;
    margin-left: 14px;
  }
  .dishes {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 18px;
  }
  .dish {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex;
    flex-direction: column;
  }
  .dish:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .dish-img {
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    position: relative;
    overflow: hidden;
  }
  .dish-img img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .dish-img img.loaded { opacity: 1; }
  .dish-img .emoji {
    z-index: 1;
    transition: opacity 0.5s;
  }
  .dish-img.has-img .emoji { opacity: 0; }
  .dish-tag {
    position: absolute;
    top: 10px;
    left: 10px;
    background: #8b1a1a;
    color: #fff;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    z-index: 2;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  .dish-tag.spicy { background: #e74c3c; }
  .dish-tag.signature { background: #f39c12; }
  .dish-tag.new { background: #27ae60; }
  .dish-body {
    padding: 14px 16px 16px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }
  .dish-name {
    font-size: 17px;
    font-weight: bold;
    color: #2c1810;
    margin-bottom: 4px;
  }
  .dish-region {
    font-size: 11px;
    color: #b08968;
    margin-bottom: 6px;
  }
  .dish-desc {
    font-size: 13px;
    color: #777;
    line-height: 1.5;
    margin-bottom: 12px;
    flex: 1;
  }
  .dish-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .price {
    color: #c0392b;
    font-size: 20px;
    font-weight: bold;
  }
  .price .yuan { font-size: 14px; margin-right: 1px; }
  .add-btn {
    background: #8b1a1a;
    color: #fff;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .add-btn:hover { background: #c0392b; transform: scale(1.1); }
  .qty-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .qty-control button {
    background: #fff;
    color: #8b1a1a;
    border: 2px solid #8b1a1a;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    line-height: 1;
  }
  .qty-control button:hover { background: #8b1a1a; color: #fff; }
  .qty-control .qty {
    font-weight: bold;
    color: #8b1a1a;
    min-width: 20px;
    text-align: center;
  }

  /* Cart drawer */
  .overlay-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 90;
  }
  .overlay-bg.show { opacity: 1; pointer-events: all; }
  .cart-drawer {
    position: fixed;
    top: 0;
    right: 0;
    width: 420px;
    max-width: 100%;
    height: 100%;
    background: #fff;
    z-index: 100;
    transform: translateX(100%);
    transition: transform 0.3s;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 20px rgba(0,0,0,0.1);
  }
  .cart-drawer.show { transform: translateX(0); }
  .cart-header {
    padding: 20px;
    background: #8b1a1a;
    color: #fff;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cart-header h2 { font-size: 20px; }
  .close-btn {
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    padding: 4px 10px;
  }
  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }
  .cart-empty {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .cart-empty .icon { font-size: 64px; margin-bottom: 10px; opacity: 0.4; }
  .cart-item {
    display: flex;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #f0e8d8;
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item-img {
    width: 56px;
    height: 56px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .cart-item-info { flex: 1; }
  .cart-item-name {
    font-weight: bold;
    margin-bottom: 4px;
    font-size: 14px;
  }
  .cart-item-price {
    color: #c0392b;
    font-size: 14px;
    font-weight: bold;
  }
  .cart-item .qty-control { margin-left: auto; align-self: center; }

  .cart-footer {
    padding: 18px 20px;
    border-top: 1px solid #e8dfd0;
    background: #faf5ec;
  }
  .cart-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 14px;
    color: #555;
  }
  .cart-total {
    font-size: 18px;
    font-weight: bold;
    color: #8b1a1a;
    margin-bottom: 14px;
  }
  .checkout-btn {
    width: 100%;
    background: #8b1a1a;
    color: #fff;
    border: none;
    padding: 14px;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .checkout-btn:hover { background: #c0392b; }
  .checkout-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #2c1810;
    color: #fff;
    padding: 12px 24px;
    border-radius: 25px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 200;
    transition: transform 0.3s;
    font-size: 14px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Modal */
  .modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 150;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal.show { opacity: 1; pointer-events: all; }
  .modal-box {
    background: #fff;
    border-radius: 16px;
    padding: 30px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s;
  }
  .modal.show .modal-box { transform: scale(1); }
  .modal-icon {
    font-size: 64px;
    margin-bottom: 10px;
  }
  .modal h2 {
    color: #8b1a1a;
    margin-bottom: 8px;
  }
  .modal p {
    color: #666;
    margin-bottom: 18px;
    line-height: 1.6;
  }
  .modal .order-no {
    background: #faf5ec;
    padding: 10px;
    border-radius: 8px;
    color: #8b1a1a;
    font-weight: bold;
    margin-bottom: 18px;
  }

  @media (max-width: 600px) {
    .header-inner { flex-direction: column; gap: 12px; }
    .tabs { top: 130px; }
    .logo h1 { font-size: 20px; }
    .dishes { grid-template-columns: 1fr 1fr; gap: 12px; }
    .dish-img { height: 120px; font-size: 48px; }
    .dish-name { font-size: 14px; }
    .dish-desc { font-size: 12px; }
    .price { font-size: 16px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">食</div>
      <div>
        <h1>食八方</h1>
        <div class="sub">中华美食 · 八方风味</div>
      </div>
    </div>
    <button class="cart-btn" id="cartBtn">
      🛒 购物车
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner" id="tabs"></div>
</nav>

<main id="menu"></main>

<div class="overlay-bg" id="overlayBg"></div>
<aside class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h2>🛒 我的购物车</h2>
    <button class="close-btn" id="closeCart">×</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer">
    <div class="cart-row"><span>小计</span><span id="subtotal">¥0</span></div>
    <div class="cart-row"><span>配送费</span><span id="delivery">¥0</span></div>
    <div class="cart-row cart-total"><span>合计</span><span id="total">¥0</span></div>
    <button class="checkout-btn" id="checkoutBtn" disabled>去结算</button>
  </div>
</aside>

<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-icon">🎉</div>
    <h2>下单成功！</h2>
    <p>厨师正在认真烹饪您的美味，请稍候～</p>
    <div class="order-no" id="orderNo">订单号：—</div>
    <button class="checkout-btn" id="modalOk">好的</button>
  </div>
</div>

<div class="toast" id="toast">已加入购物车</div>

const cart = new Map(); // id -> {dish, qty}

const tabsEl = document.getElementById('tabs');
const menuEl = document.getElementById('menu');

function createDishCard(d) {
  const card = document.createElement('article');
  card.className = 'dish';
  card.innerHTML = `
    <div class="dish-img" id="img-${d.id}" style="background: ${d.bg}">
      <img alt="${d.name}" loading="lazy">

      <span class="emoji">${d.emoji}</span>

        <div class="price"><span class="yuan">¥</span>${d.price}</div>

      </div>

  `;
  updateDishControl(d, card.querySelector('#ctrl-' + d.id));
  // Load real image from Wikipedia in background
  loadDishImage(d, card.querySelector('#img-' + d.id));
  return card;
}

// Filter for picking food images out of a Wikipedia page's image list
function looksLikeFoodImage(filename) {
  const f = filename.toLowerCase();
  const rejects = [
    'commons-logo', 'wikidata', 'wiktionary', 'wikiquote', 'wikibooks',
    'disambig', 'question_book', 'wiki_letter', 'wikimedia',
    'flag_of', 'flag-', '_flag_', 'coat_of_arms', 'symbol', 'emblem',
    'icon', 'logo', 'cscr-featured', 'merge-arrows', 'mergefrom',
    'mergeto', 'p_vip', 'translate', 'broom_icon', 'edit-clear',
    'red_pog', 'speakerlink', 'crystal_clear', 'gnome-', 'noun_',
    'circled', 'allow', 'red_x', 'green_check', 'star_full',
    'sound-icon', 'speaker_icon', 'ambox', 'nuvola', 'tango_',
  ];
  if (rejects.some(r => f.includes(r))) return false;
  if (f.endsWith('.svg') || f.endsWith('.gif') || f.endsWith('.tif')) return false;
  return /\.(jpe?g|png|webp)$/i.test(f);
}

function testImage(url, timeoutMs = 4000) {
  return new Promise(resolve => {
    const im = new Image();
    let done = false;
    const finish = ok => { if (!done) { done = true; resolve(ok); } };
    im.onload = () => finish(true);
    im.onerror = () => finish(false);
    im.src = url;
    setTimeout(() => finish(false), timeoutMs);
  });
}

// Get lead image via pageimages API (works for most articles)
async function getPageImage(lang, title) {
  try {
    const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&prop=pageimages&piprop=original|thumbnail&pithumbsize=800&titles=${encodeURIComponent(title)}&origin=*`;
    const r = await fetch(url);
    if (!r.ok) return null;
    const data = await r.json();
    const pages = data.query?.pages || {};
    for (const k in pages) {
      const p = pages[k];
      const u = p.original?.source || p.thumbnail?.source;
      if (u) return u.replace(/\/(\d{2,4})px-/, '/800px-');
    }
  } catch {}
  return null;
}

// Get all images on the page, return list of Special:FilePath URLs (filtered)
async function getAllPageImages(lang, title, dish) {
  try {
    const url = `https://${lang}.wikipedia.org/w/api.php?action=query&format=json&prop=images&titles=${encodeURIComponent(title)}&imlimit=40&origin=*`;
    const r = await fetch(url);
    if (!r.ok) return [];
    const data = await r.json();
    const pages = data.query?.pages || {};
    let files = [];
    for (const k in pages) {
      files = (pages[k].images || []).map(i => (i.title || '').replace(/^File:/i, '').replace(/ /g, '_'));
      break;
    }
    // Filter and sort
    files = files.filter(looksLikeFoodImage);
    const kw = (dish.wikiEn || dish.wiki || '').toLowerCase();
    files.sort((a, b) => {
      const am = a.toLowerCase().includes(kw) ? -1 : 0;
      const bm = b.toLowerCase().includes(kw) ? -1 : 0;
      return am - bm;
    });
    return files.map(f => `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(f)}?width=800`);
  } catch { return []; }
}

// Verified Wikimedia Commons filenames for dishes whose Wikipedia article has no good image
const HARDCODED_IMG = {
  10: 'Roast_goose_in_yat_lok_restaurant.JPG',                           // 烧鹅
  23: 'Fermented_mandarin_fish.jpg',                                      // 臭鳜鱼
  24: '202112_Rural-style_Sauteed_Beef_Slices_with_peppers_at_CHILA.jpg', // 小炒黄牛肉
  28: 'Yangrou_Paomo.JPG',                                                // 羊肉泡馍
  32: 'Grass_Jelly_with_Taro_Balls,_Sweet_Potato_and_Pearl.jpg',          // 芋圆烧仙草
};

async function loadDishImage(dish, container) {
  if (!container) return;
  const imgEl = container.querySelector('img');
  const apply = (url) => {
    imgEl.src = url;
    imgEl.classList.add('loaded');
    container.classList.add('has-img');
  };

  // Build candidate list from multiple sources, in priority order
  const langs = [];
  if (dish.wiki) langs.push(['zh', dish.wiki]);
  if (dish.wikiEn) langs.push(['en', dish.wikiEn]);

  // Primary: pageimages lead image (most reliable for any page that has one)
  for (const [lang, title] of langs) {
    const u = await getPageImage(lang, title);
    if (u && await testImage(u)) return apply(u);
  }

  // Secondary: enumerate all images on the page and pick first food-looking one
  for (const [lang, title] of langs) {
    const urls = await getAllPageImages(lang, title, dish);
    for (const u of urls) {
      if (await testImage(u)) return apply(u);
    }
  }

  // Tertiary: hardcoded Wikimedia Commons filenames (verified to exist)
  if (HARDCODED_IMG[dish.id]) {
    const u = `https://commons.wikimedia.org/wiki/Special:FilePath/${encodeURIComponent(HARDCODED_IMG[dish.id])}?width=800`;
    if (await testImage(u)) return apply(u);
  }
  // If all fail, emoji stays visible — graceful fallback
}

function updateDishControl(d, container) {
  const item = cart.get(d.id);
  if (!item) {
    container.innerHTML = '';
    const btn = document.createElement('button');
    btn.className = 'add-btn';
    btn.textContent = '+';
    btn.onclick = () => { addToCart(d); showToast(`已加入「${d.name}」`); };
    container.appendChild(btn);
  } else {
    container.innerHTML = `
      <div class="qty-control">
        <button data-act="dec">-</button>
        <span class="qty">${item.qty}</span>
        <button data-act="inc">+</button>
      </div>
    `;
    container.querySelector('[data-act="inc"]').onclick = () => addToCart(d);
    container.querySelector('[data-act="dec"]').onclick = () => removeFromCart(d);
  }
}

function refreshDishControl(id) {
  const dish = findDish(id);
  if (!dish) return;
  const container = document.getElementById('ctrl-' + id);
  if (container) updateDishControl(dish, container);
}

function findDish(id) {
  for (const cat of MENU) {
    const d = cat.dishes.find(x => x.id === id);
    if (d) return d;
  }
  return null;
}

function addToCart(d) {
  const item = cart.get(d.id);
  if (item) item.qty += 1;
  else cart.set(d.id, { dish: d, qty: 1 });
  refreshDishControl(d.id);
  renderCart();
}

function removeFromCart(d) {
  const item = cart.get(d.id);
  if (!item) return;
  item.qty -= 1;
  if (item.qty <= 0) cart.delete(d.id);
  refreshDishControl(d.id);
  renderCart();
}

function renderCart() {
  const totalQty = [...cart.values()].reduce((s, i) => s + i.qty, 0);
  cartBadge.textContent = totalQty;
  cartBadge.style.display = totalQty > 0 ? 'inline-block' : 'none';

  if (cart.size === 0) {
    cartItemsEl.innerHTML = `
      <div class="cart-empty">
        <div class="icon">🍽️</div>
        <p>购物车空空如也<br>快去挑选美味佳肴吧～</p>
      </div>`;
  } else {
    cartItemsEl.innerHTML = '';
    [...cart.values()].forEach(({ dish, qty }) => {
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = `
        <div class="cart-item-img" style="background: ${dish.bg}">${dish.emoji}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${dish.name}</div>
          <div class="cart-item-price">¥${dish.price} × ${qty} = ¥${dish.price * qty}</div>
        </div>
        <div class="qty-control">
          <button data-act="dec">-</button>
          <span class="qty">${qty}</span>
          <button data-act="inc">+</button>
        </div>
      `;
      row.querySelector('[data-act="inc"]').onclick = () => addToCart(dish);
      row.querySelector('[data-act="dec"]').onclick = () => removeFromCart(dish);
      cartItemsEl.appendChild(row);
    });
  }

  const subtotal = [...cart.values()].reduce((s, i) => s + i.dish.price * i.qty, 0);
  const delivery = subtotal > 0 ? DELIVERY_FEE : 0;
  subtotalEl.textContent = '¥' + subtotal;
  deliveryEl.textContent = '¥' + delivery;
  totalEl.textContent = '¥' + (subtotal + delivery);
  checkoutBtn.disabled = cart.size === 0;
}

function showCart() {
  cartDrawer.classList.add('show');
  overlayBg.classList.add('show');
}
function hideCart() {
  cartDrawer.classList.remove('show');
  overlayBg.classList.remove('show');
}

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
}

cartBtn.onclick = showCart;
closeCart.onclick = hideCart;
overlayBg.onclick = hideCart;

checkoutBtn.onclick = () => {
  if (cart.size === 0) return;
  const orderNo = 'SBF' + Date.now().toString().slice(-8);
  orderNoEl.textContent = '订单号：' + orderNo;
  modal.classList.add('show');
};

modalOk.onclick = () => {
  modal.classList.remove('show');
  // Reset cart after order
  cart.clear();
  renderCart();
  document.querySelectorAll('[id^="ctrl-"]').forEach(el => {
    const id = Number(el.id.replace('ctrl-', ''));
    const d = findDish(id);
    if (d) updateDishControl(d, el);
  });
  hideCart();
};

renderCart();
</script>
